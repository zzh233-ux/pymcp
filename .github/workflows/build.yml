name: Build McpFne

on:
  push:
    branches: [main]
    paths:
      - 'McpFne.vcxproj'
      - 'src/**'
      - 'elib/**'
      - 'thirdparty/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild McpFne.vcxproj /t:Build /p:Configuration=Release_E /p:Platform=Win32 /m /v:minimal

      - name: Upload fne
        uses: actions/upload-artifact@v4
        with:
          name: McpFne-fne
          path: bin/Release_E/McpFne.fne
          if-no-files-found: error